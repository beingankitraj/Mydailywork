<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strong Password Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Password Generator</h1>
            <p>Create strong and secure passwords instantly.</p>
        </header>

        <div class="result-container">
            <input type="text" id="password-result" readonly placeholder="Your password will appear here">
            <button id="copy-btn" class="btn" title="Copy to clipboard">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
            </button>
        </div>
        
        <div class="toast" id="toast">Password copied to clipboard!</div>

        <div class="settings">
            <div class="setting">
                <label>Password Length: <span id="length-val">12</span></label>
                <input type="range" id="length-slider" min="6" max="64" value="12">
            </div>

            <div class="setting checkbox-container">
                <label class="custom-checkbox">
                    <input type="checkbox" id="uppercase" checked>
                    <span class="checkmark"></span>
                    Include Uppercase Letters
                </label>
            </div>

            <div class="setting checkbox-container">
                <label class="custom-checkbox">
                    <input type="checkbox" id="lowercase" checked>
                    <span class="checkmark"></span>
                    Include Lowercase Letters
                </label>
            </div>

            <div class="setting checkbox-container">
                <label class="custom-checkbox">
                    <input type="checkbox" id="numbers" checked>
                    <span class="checkmark"></span>
                    Include Numbers
                </label>
            </div>

            <div class="setting checkbox-container">
                <label class="custom-checkbox">
                    <input type="checkbox" id="symbols" checked>
                    <span class="checkmark"></span>
                    Include Symbols
                </label>
            </div>
        </div>

        <button id="generate-btn" class="btn primary-btn">Generate Password</button>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
